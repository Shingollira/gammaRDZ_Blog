<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR_Text_Read</title>
</head>
<body style="background:black; color:white; font-family:monospace;">

<h1 id="text"></h1>

<script>
const params = new URLSearchParams(window.location.search);
const msg = params.get("msg");

document.getElementById("text").textContent = msg || "Sin mensaje";
</script>

</body>
</html>
