<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Qr_Plain_Text_Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div id="message"></div>

<script>
const messageDiv = document.getElementById("message");

// Tomar el parámetro "msg" de la URL
const params = new URLSearchParams(window.location.search);
const msg = params.get("msg");

if(msg) {
  const decodedMsg = decodeURIComponent(msg);
  messageDiv.textContent = decodedMsg;

  // Cambiar el título dinámicamente según el mensaje
  document.title = decodedMsg;
} else {
  messageDiv.textContent = "No se detectó mensaje, regresando…";
  setTimeout(() => {
    history.back();
  }, 1000); // 1 segundo antes de regresar
}
</script>

</body>
</html>
