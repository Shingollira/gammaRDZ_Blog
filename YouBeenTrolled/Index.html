<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YouBeenTrolled</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: "Times New Roman", serif;
}

#msg {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 60px;
  font-weight: bold;
  z-index: 10;
  text-shadow: 0 0 15px black;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain; /* asegura que se vea todo */
  background: black;
}
</style>
</head>
<body>

<div id="msg">You just got rickrolled, kid.</div>

<video id="vid" autoplay muted playsinline>
  <source src="https://shattereddisk.github.io/rickroll/rickroll.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("vid");

// Leer parámetro ?msg=
const params = new URLSearchParams(location.search);
const redirect = params.get("msg");

// Quitar mute al tocar pantalla
document.body.addEventListener("click", () => {
  video.muted = false;
});

// Función para reproducir segmentos si hay link
if (redirect) {
  let stage = 0;
  
  video.currentTime = 0; // inicio en 0
  video.play();

  const checkTime = setInterval(() => {
    if (stage === 0 && video.currentTime >= 7) {
      video.currentTime = 43;
      stage = 1;
    } else if (stage === 1 && video.currentTime >= 50) {
      clearInterval(checkTime);
      window.location.href = redirect;
    }
  }, 100);
} else {
  // No hay link: reproducir completo
  video.addEventListener("ended", () => {
    console.log("videocomplete");
  });
}
</script>

</body>
  </html>
