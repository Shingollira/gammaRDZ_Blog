<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Playlist Slices</title>

<style>
body{
  background: black;
  margin: 0;
}

img{
  display: block;
  width: 100%;
  margin-bottom: 10px;
}
</style>

</head>
<body>

<script>
const playlists = ["playlist1", "playlist2"];

for (let name of playlists){
    for(let i = 0; i < 50; i++){
        const img = document.createElement("img");
        img.src = `${name}_slice_${i}.png`;
        img.onerror = () => img.remove();
        document.body.appendChild(img);
    }
}
</script>

</body>
</html>
