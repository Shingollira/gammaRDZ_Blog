<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Playlist Split</title>
<style>
body {
  background: black;
  margin: 0;
}
canvas {
  display: block;
  margin: 20px auto;
  border: 1px solid white;
}
</style>
</head>
<body>

<script>
const img = new Image();
img.src = "image1.png"; // MISMA CARPETA

img.onload = () => {
    const sliceHeight = 800; // MÁS PEQUEÑO = más legible
    const totalSlices = Math.ceil(img.height / sliceHeight);

    for(let i = 0; i < totalSlices; i++){
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = sliceHeight;

        ctx.drawImage(
            img,
            0, i * sliceHeight,
            img.width, sliceHeight,
            0, 0,
            img.width, sliceHeight
        );

        document.body.appendChild(canvas);
    }
};

img.onerror = () => {
    document.body.innerHTML = "<h1 style='color:white'>Error cargando imagen</h1>";
};
</script>

</body>
</html>
