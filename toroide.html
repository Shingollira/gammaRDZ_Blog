<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ASCII Donut + MOD</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
text-align:center;
}

pre{
font-size:10px;
line-height:10px;
}

</style>

</head>

<body>

<h3>ASCII Donut + MOD Demo</h3>
<p>Haz click para iniciar</p>

<pre id="donut"></pre>


<!-- CONFIG LIBOPENMPT -->
<script>

var Module = {

onRuntimeInitialized: function(){

console.log("libopenmpt listo");

window.player = new ChiptuneJsPlayer(
new ChiptuneJsConfig(-1)
);

}

};

var libopenmpt = Module;

</script>


<!-- LIBRERÍAS -->
<script src="js/libopenmpt.js"></script>
<script src="js/chiptune2.js"></script>


<script>

function startDemo(){

startMusic();
startDonut();

}


function startMusic(){

if(!window.player) return;

player.load("music.mod", function(buffer){

player.play(buffer);

});

}


function startDonut(){

var A=0;
var B=0;

setInterval(function(){

var b=[];
var z=[];

for(var k=0;k<1760;k++){

b[k]=k%80==79 ? "\n":" ";
z[k]=0;

}

for(var j=0;j<6.28;j+=0.07){

for(var i=0;i<6.28;i+=0.02){

var c=Math.sin(i);
var d=Math.cos(j);
var e=Math.sin(A);
var f=Math.sin(j);
var g=Math.cos(A);
var h=d+2;
var D=1/(c*h*e+f*g+5);
var l=Math.cos(i);
var m=Math.cos(B);
var n=Math.sin(B);
var t=c*h*g-f*e;

var x=0|40+30*D*(l*h*m-t*n);
var y=0|12+15*D*(l*h*n+t*m);

var o=x+80*y;

var N=0|8*((f*e-c*d*g)*m-c*d*e-f*g-l*d*n);

if(y<22 && y>=0 && x>=0 && x<80 && D>z[o]){

z[o]=D;
b[o]=".,-~:;=!*#$@"[N>0?N:0];

}

}

}

document.getElementById("donut").textContent=b.join("");

A+=0.04;
B+=0.02;

},50);

}


window.addEventListener("click", startDemo, {once:true});

</script>

</body>
</html>
