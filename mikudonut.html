<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ASCII + Donut</title>

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family: monospace;
}

pre{
  color:white;
  margin:0;
  display:none;
}

#startText{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:40px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="startText">click_me</div>
<pre id="screen"></pre>

<script>
/* cargar ascii */
async function loadASCII(url){
    let res = await fetch(url);
    return await res.text();
}

/* resize automático */
function resize(pre, text){
    let lines = text.split("\n");
    let cols = Math.max(...lines.map(l=>l.length));
    let rows = lines.length;

    let sizeW = window.innerWidth / cols;
    let sizeH = window.innerHeight / rows;
    let size = Math.min(sizeW, sizeH);

    pre.style.fontSize = size + "px";
    pre.style.lineHeight = size + "px";
}

/* animación ASCII ida/vuelta */
async function playASCII(){
    const pre = document.getElementById("screen");

    let frames = await Promise.all([
        loadASCII("ascii_art.txt"),
        loadASCII("ascii_art (1).txt"),
        loadASCII("ascii_art (2).txt")
    ]);

    let loopFrames = [
        ...frames,
        ...frames.slice(1, -1).reverse()
    ];

    let i = 0;

    return new Promise(resolve=>{
        let interval = setInterval(()=>{
            let frame = loopFrames[i];
            pre.textContent = frame;
            resize(pre, frame);

            i++;
            if(i >= loopFrames.length * 2){ // repite 2 ciclos
                clearInterval(interval);
                resolve();
            }
        }, 120);
    });
}

/* donut */
function startDonut(){
    var A=0, B=0;
    const pre = document.getElementById("screen");

    setInterval(function(){
        var b=[], z=[];
        for(var k=0;k<1760;k++){
            b[k]=k%80==79 ? "\n":" ";
            z[k]=0;
        }
        for(var j=0;j<6.28;j+=0.07){
        for(var i=0;i<6.28;i+=0.02){
            var c=Math.sin(i), d=Math.cos(j), e=Math.sin(A), f=Math.sin(j),
                g=Math.cos(A), h=d+2, D=1/(c*h*e+f*g+5),
                l=Math.cos(i), m=Math.cos(B), n=Math.sin(B),
                t=c*h*g-f*e,
                x=0|40+30*D*(l*h*m-t*n),
                y=0|12+15*D*(l*h*n+t*m),
                o=x+80*y,
                N=0|8*((f*e-c*d*g)*m-c*d*e-f*g-l*d*n);
            if(y<22 && y>=0 && x>=0 && x<80 && D>z[o]){
                z[o]=D;
                b[o]=".,-~:;=!*#$@"[N>0?N:0];
            }
        }}
        pre.textContent=b.join("");
        resize(pre, pre.textContent);
        A+=0.04; B+=0.02;
    },50);
}

/* inicio */
async function startAll(){
    if(window.started) return;

    const pre = document.getElementById("screen");
    document.getElementById("startText").style.display = "none";
    pre.style.display = "block";

    // ASCII primero
    await playASCII();

    // luego donut infinito
    startDonut();

    window.started = true;
}

window.addEventListener("click", startAll);
</script>

</body>
</html>
