<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>gammaRDZ's blog</title>
<link rel="icon" href="/iconblog.jpg" type="image/jpeg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css?family=Roboto:400,700');

body{
    font-family: Roboto, sans-serif;
    margin:0;
    padding:0;
    background:#fff;
    color:#000;
}

/* RiiTag arriba ancho completo */
.top-riitag{
    width:100%;
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}
.top-riitag img{
    max-width:100%;
    height:auto;
}

/* Layout principal */
main{
    display:flex;
    justify-content:center;
    gap:40px;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* POSTS */
section{
    flex:1;
    max-width:700px;
}

article{
    margin-bottom:40px;
}

article img{
    max-width:100%;
    display:block;
    margin:10px 0;
}

.post-header{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.post-header img{
    width:48px;
    height:48px;
    margin-right:10px;
}

.post-footer{
    font-size:0.85rem;
    color:#555;
    margin-top:10px;
}

/* SIDEBAR sticky con scroll */
aside{
    width:260px;
    display:flex;
    flex-direction:column;
    max-height: calc(100vh - 20px);
    position: sticky;
    top: 20px;
    overflow-y: auto;
}

/* Sidebar elementos */
aside img.avatar{
    width:128px;
    height:128px;
    margin-bottom:15px;
    display:block;
}

/* Links del sidebar en negro y sin azul */
aside a:link,
aside a:visited,
aside a:active{
    color: #000;
    text-decoration: none;
    margin-right:8px;
}
aside a:hover{
    text-decoration: underline;
}

/* Links en línea */
.sidebar-links{
    display:flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom:10px;
}

/* LAB al final */
.sidebar-lab{
    margin-top: auto;
    padding-top: 20px;
}

/* Texto en línea */
.sidebar-text-line{
    white-space: nowrap;
    margin-bottom:10px;
}

/* Responsive */
@media(max-width:900px){
    main{
        flex-direction:column;
    }
    aside{
        width:100%;
        max-height:none;
        position:relative;
        top:auto;
        margin-bottom:30px;
    }
}
</style>
</head>
<body>

<!-- RiiTag -->
<div class="top-riitag">
    <img src="https://riitag.t0g3pii.de/1294064411811647560/tag.max.png" alt="RiiTag">
</div>

<main>

<!-- POSTS -->
<section id="posts">
<p>Cargando posts...</p>
</section>

<!-- SIDEBAR -->
<aside>

<img src="https://64.media.tumblr.com/231c9257028215c4ded969835e060f91/d926048b57000bce-2b/s128x128u_c1/56e5fd8022e0f62cd8f5c5ffd73ec1f8d43a1dc2.pnj" class="avatar" alt="Avatar">

<strong>gammaRDZ's blog</strong><br>
"un poco de todo"<br><br>

<!-- Links en línea -->
<div class="sidebar-links">
    <a href="https://gammardz.tumblr.com/">Inicio</a>
    <a href="https://gammardz.tumblr.com/ask">Ask</a>
    <a href="https://gammardz.tumblr.com/submit">Submit</a>
    <a href="https://gammardz.tumblr.com/archive">Archive</a>
</div>

<!-- Textos en línea -->
<div class="sidebar-links">
    <span>solo estare subiendo cosas aca</span>
</div>
<div class="sidebar-links">
    <span>probablemente dibujos y renders</span>
</div>
<div class="sidebar-links">
    <a href="https://www.youtube.com/channel/UCVtkrUXx5DNBBcGEdIhjwBQ" target="_blank">youtube: gammaRDZ</a>
</div>
<div class="sidebar-links">
    <span>mi <a href="https://www.youtube.com/channel/UCVtkrUXx5DNBBcGEdIhjwBQ" target="_blank">canal</a> donde tambien subo cosas :D</span>
</div>

<!-- LAB al final -->
<div class="sidebar-lab">
    Has encontrado el <a href="lab.html">laboratorio!</a> <!-- referencia a Spantom xD -->
</div>

</aside>

</main>

<script>
const blogName = "gammardz";
const apiKey = "7ssDQBi15up6df48brKs6AH3B3QcRLzBqN3Cj3fpilE9NwbAlr";
const postsContainer = document.getElementById("posts");

function timeAgo(timestamp){
    const now = Date.now();
    const diff = now - new Date(timestamp).getTime();
    const minutes = Math.floor(diff/(1000*60));
    if(minutes<60) return `${minutes} minutos`;
    const hours = Math.floor(minutes/60);
    if(hours<24) return `${hours} horas`;
    const days = Math.floor(hours/24);
    return `${days} días`;
}

async function cargarPosts(){
    try{
        const res = await fetch(`https://api.tumblr.com/v2/blog/${blogName}.tumblr.com/posts?api_key=${apiKey}`);
        const data = await res.json();
        const posts = data.response.posts;
        postsContainer.innerHTML = "";

        posts.forEach(post=>{
            const article = document.createElement("article");

            const header = document.createElement("div");
            header.classList.add("post-header");
            header.innerHTML = `
                <img src="https://64.media.tumblr.com/231c9257028215c4ded969835e060f91/d926048b57000bce-2b/s128x128u_c1/56e5fd8022e0f62cd8f5c5ffd73ec1f8d43a1dc2.pnj">
                <strong>${post.blog_name}</strong>
            `;
            article.appendChild(header);

            if(post.type==="text"){
                if(post.title){
                    article.innerHTML += `<h3>${post.title}</h3>`;
                }
                article.innerHTML += `<div>${post.body}</div>`;
            }

            if(post.type==="photo"){
                post.photos.forEach(photo=>{
                    const img = document.createElement("img");
                    img.src = photo.original_size.url;
                    article.appendChild(img);
                });
                if(post.caption){
                    article.innerHTML += `<div>${post.caption}</div>`;
                }
            }

            if(post.type==="video"){
                if(post.player){
                    article.innerHTML += post.player[0].embed_code;
                }
            }

            const footer = document.createElement("div");
            footer.classList.add("post-footer");
            footer.innerHTML = `Publicado hace ${timeAgo(post.date)} con ${post.note_count} notas`;
            article.appendChild(footer);

            postsContainer.appendChild(article);
        });

    }catch(e){
        postsContainer.innerHTML="<p>No se pudieron cargar los posts.</p>";
        console.error(e);
    }
}

cargarPosts();
</script>

</body>
</html>
